server:
  port: 9080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: mirage-mock
  profiles:
    active: ${MIRAGE_PROFILE:local}
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

mirage:
  http:
    enabled: true
    port: 19080
    timeout-hang-ms: 60000
  security:
    jwt-secret: ${MIRAGE_JWT_SECRET:mirage-mock-dev-jwt-secret-please-change-in-prod-0123456789}
    jwt-ttl-hours: 12
    master-key: ${MIRAGE_MASTER_KEY:mirage-mock-dev-master-key}

logging:
  level:
    com.miragemock: INFO
    org.flywaydb: WARN
